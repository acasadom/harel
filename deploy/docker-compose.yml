# A realistic distributed stack: Redis as the event transport + N worker replicas
# that wait for events, sharing the durable store. The integration test runs as
# its OWN container (the `test` service) so it shares the same VM kernel + volume
# as the workers — sqlite WAL works there (a macOS bind mount over virtiofs does
# not). Bring up the infra + workers, then run the test:
#
#   docker compose -f deploy/docker-compose.yml up -d --build --scale worker=3 redis worker
#   docker compose -f deploy/docker-compose.yml run --rm test
#   docker compose -f deploy/docker-compose.yml down -v
#
# STM_STORE_BACKEND picks the durable store: sqlite (default, shared volume),
# redis, postgres, rqlite, mongo, libsql or dynamodb (all-network; dynamodb runs
# on localstack). For each non-sqlite backend also bring up its matching service.
# See deploy/README.md.
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: stm
      POSTGRES_PASSWORD: stm
      POSTGRES_DB: stm
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "stm"]
      interval: 2s
      timeout: 3s
      retries: 15

  rqlite:
    image: rqlite/rqlite:8.43.4
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/readyz"]
      interval: 2s
      timeout: 3s
      retries: 15

  mongo:
    image: mongo:7
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 15s

  localstack:
    image: localstack/localstack:4.14
    environment:
      SERVICES: sqs,dynamodb,lambda
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 3s
      timeout: 5s
      retries: 20
    volumes:
      # LocalStack runs each Lambda (zip) in a container it launches on the HOST
      # docker daemon, so it needs the socket. (Image packaging is Pro; we use zip.)
      - /var/run/docker.sock:/var/run/docker.sock


  worker:
    image: harel_stack
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      - redis
    environment:
      STM_STORE_BACKEND: ${STM_STORE_BACKEND:-sqlite}
      STM_TRANSPORT_BACKEND: ${STM_TRANSPORT_BACKEND:-redis}
      STM_REDIS_URL: redis://redis:6379/0
      STM_STORE_DB: /state/stm.db
      STM_TRANSPORT_DB: /state/queue.db
      STM_POSTGRES_DSN: postgresql://stm:stm@postgres:5432/stm
      STM_RQLITE_URL: http://rqlite:4001
      STM_MONGO_URL: mongodb://mongo:27017
      STM_MONGO_DB: harel
      STM_LIBSQL_DB: /state/libsql.db
      STM_SQS_ENDPOINT: http://localstack:4566
      STM_DYNAMODB_ENDPOINT: http://localstack:4566
      STM_AWS_REGION: us-east-1
      STM_VISIBILITY: "30"
    volumes:
      - state:/state

  test:
    image: harel_stack
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      - redis
      - worker
    environment:
      STM_STACK: "1"
      STM_STORE_BACKEND: ${STM_STORE_BACKEND:-sqlite}
      STM_TRANSPORT_BACKEND: ${STM_TRANSPORT_BACKEND:-redis}
      STM_REDIS_URL: redis://redis:6379/0
      STM_STORE_DB: /state/stm.db
      STM_TRANSPORT_DB: /state/queue.db
      STM_POSTGRES_DSN: postgresql://stm:stm@postgres:5432/stm
      STM_RQLITE_URL: http://rqlite:4001
      STM_MONGO_URL: mongodb://mongo:27017
      STM_MONGO_DB: harel
      STM_LIBSQL_DB: /state/libsql.db
      STM_SQS_ENDPOINT: http://localstack:4566
      STM_DYNAMODB_ENDPOINT: http://localstack:4566
      STM_AWS_REGION: us-east-1
      # the FaaS Lambda stack test (test_faas_lambda.py): the LocalStack lambda
      # endpoint + the zip built by the Dockerfile.lambda export target. Unset (or a
      # missing zip) => that test skips.
      STM_LAMBDA_ENDPOINT: http://localstack:4566
      STM_LAMBDA_ZIP: /app/deploy/build/function.zip
    volumes:
      - state:/state
      # the prebuilt Lambda zip (docker build --target export --output deploy/build ..)
      - ./build:/app/deploy/build:ro
    command: ["uv", "run", "pytest", "-m", "stack", "-v"]

volumes:
  state:
